<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS S3 Static Website</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5f5;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 This is version 2</h1>
    <p>Deployed by Arpit Kumar</p>
    <button onclick="changeText()">Click Me</button>
</header>

<section class="container">
    <div class="card">
        <h2>📦 S3 Bucket</h2>
        <p>Objects stored securely in AWS S3.</p>
    </div>

    <div class="card">
        <h2>🔁 Versioning</h2>
        <p>Multiple versions of files maintained.</p>
    </div>

    <div class="card">
        <h2>🌐 Hosting</h2>
        <p>Static website hosted using S3.</p>
    </div>

    <div class="card">
        <h2>💰 Lifecycle</h2>
        <p>Cost optimized using lifecycle rules.</p>
    </div>
</section>

<footer>
    <p>© 2026 Arpit Kumar | AWS Assignment</p>
</footer>

<script>
    function changeText() {
        document.querySelector("p").innerText = "🔥 You clicked the button!";
    }
</script>

</body>
</html>
